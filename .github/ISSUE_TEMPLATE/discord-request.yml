name: "💬 Discord Infrastructure Request"
description: "Request a new channel, category, role, bot, or integration for the ONM Discord server."
title: "[Discord]: <Proposed Name>"
labels: ["discord-request", "pending-review"]
body:
  - type: markdown
    attributes:
      value: |
        ### 👋 Welcome to the ONM Discord Request Form!
        Thank you for your interest in expanding the Open Neuromorphic (ONM) Discord community. 

        To ensure our server remains organized, active, and easy to navigate for newcomers, the Executive Committee (EC) and Moderation Team review all requests to prevent channel bloat and verify data security for bots and integrations.

  - type: checkboxes
    id: request_type
    attributes:
      label: "Type of Request"
      description: "Check all that apply."
      options:
        - label: "New Text Channel"
        - label: "New Voice/Stage Channel"
        - label: "New Category / Working Group Space"
        - label: "New User Role"
        - label: "Bot or External Integration (e.g., Webhook, RSS feed)"
        - label: "Consultation requested to understand options"

  - type: input
    id: proposed_name
    attributes:
      label: "Proposed Name"
      description: "What should we call this?"
      placeholder: "e.g., #neuromorphic-medicine, @Event-Host, or DynoBot"
    validations:
      required: true

  - type: textarea
    id: short_description
    attributes:
      label: "Short Description"
      description: "Provide a brief (1-3 sentences) description of what this infrastructure will be used for and its primary purpose."
    validations:
      required: true

  - type: textarea
    id: community_need
    attributes:
      label: "Community Need & Alignment"
      description: "We enthusiastically welcome new ideas for community spaces! To help keep our server active and avoid empty channels, please share what is driving this request. Whether it's a bustling conversation in another channel that needs its own home, a new working group, or a growing open-source project, tell us why this topic needs a dedicated space."
    validations:
      required: true

  - type: input
    id: target_audience
    attributes:
      label: "Target Audience"
      description: "Who is this space or tool for?"
      placeholder: "e.g., Undergraduate students, hardware engineers, specific initiative volunteers."
    validations:
      required: true

  - type: input
    id: champions
    attributes:
      label: "Primary Champion(s) / Moderator(s)"
      description: "Any new dedicated space or tool must have a champion from the ONM community responsible for keeping the conversation active, guiding newcomers, or maintaining the integration. List the Discord usernames of the people who will lead this."
      placeholder: "@username1, @username2"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### 🤖 For Bots & Integrations ONLY
        *If you are only requesting a channel or role, you can leave the next three fields blank.*

        Because bots and integrations interact with our community, we carefully audit them to prevent unauthorized data scraping or security vulnerabilities. Please outline exactly what data the bot accesses and where it goes.

  - type: input
    id: bot_permissions
    attributes:
      label: "Required Bot Permissions"
      placeholder: "e.g., reading message history, managing roles, posting links"
    validations:
      required: false

  - type: input
    id: bot_privacy_url
    attributes:
      label: "Security & Privacy Policy URL"
      description: "Link to the bot/integration's official data and privacy policy."
      placeholder: "https://..."
    validations:
      required: false

  - type: textarea
    id: bot_data_destination
    attributes:
      label: "Data Destination & Ownership"
      description: "Who receives the data, where is it hosted, and what is it used for?"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### ⚖️ ONM Discord Agreement
        By requesting this Discord infrastructure, you agree to the following terms. **(Please check all to submit)**

  - type: checkboxes
    id: agreements
    attributes:
      label: "Acknowledgements"
      options:
        - label: "**Code of Conduct & Moderation:** I agree that all interactions within this requested space or facilitated by this requested tool are subject to the ONM [Code of Conduct](https://open-neuromorphic.org/code-of-conduct/). I acknowledge that ONM Community Moderators will observe the channel to address any CoC violations and support the champion(s) in keeping the space safe, functional, and welcoming."
          required: true
        - label: "**Archival & Governance Policy:** I understand that while ONM enthusiastically welcomes and hosts new community spaces, the Executive Committee (EC) retains ultimate jurisdiction over all server infrastructure. If a hosted channel or integration undergoes a significant change in scope, becomes inactive, or creates an undue administrative/moderation burden, the EC reserves the right to review, merge, or archive the space at its sole discretion."
          required: true
        - label: "**Bot Security (If applicable):** I confirm that any requested bot or integration complies with ONM's data privacy standards and will not scrape or monetize community data."
          required: true
        - label: "**Community First:** I acknowledge that this space is for open scientific discussion and collaboration, not for unilateral corporate advertising or closed-source commercial funnels."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        *(For Executive Committee & Moderation Team use: Copy the checklist below into a comment when reviewing)*
        ```markdown
        ### 🛑 EC / Mod Review Checklist
        - [ ] **Community need & champion vetted**
        - [ ] **Infrastructure created & permissions granted**
        - [ ] **(If Bot/Integration) Security & Privacy verified**
        ```